<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cardápio">
<title>Meu Cardápio · Anna Júlia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#2E5339;--gd:#1f3d28;--gl:#e8f4ec;--gt:#2E5339;
  --ab:#fef3e2;--at:#92400e;
  --bg:#f4f4f0;--sf:#fff;--tx:#111;--tx2:#555;--tx3:#999;
  --br:#e8e8e6;--br2:#d0d0cc;
  --tab:60px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--sf:#1c1c1e;--tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --br:#2a2a2a;--br2:#3a3a3a;--gl:#1a3325;--ab:#2d1f00;--at:#f6c05c}
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
body{padding-bottom:calc(var(--tab) + var(--sb) + 16px);padding-top:var(--st)}

/* HEADER */
.hdr{background:var(--g);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.hdr-btns{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.hbtn:active{background:rgba(255,255,255,.35)}

/* DAY PANEL */
#day-panel{background:var(--sf);border-bottom:1px solid var(--br);max-height:0;overflow:hidden;transition:max-height .3s ease}
#day-panel.open{max-height:500px}
.day-inner{padding:12px 16px 12px}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.day-top h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3)}
.day-top button{font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer;padding:2px 6px}
.day-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.day-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:7px 10px}
.day-row-cat{font-size:11px;font-weight:700;color:var(--tx2);min-width:50px}
.day-row-name{font-size:13px;color:var(--tx);flex:1;line-height:1.25}
.swap-btn{background:none;border:1px solid var(--br2);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--tx2);cursor:pointer;white-space:nowrap}
.day-totals{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dtot{background:var(--bg);border-radius:10px;padding:5px 10px;font-size:13px;font-weight:700;color:var(--tx)}
.dtot span{font-size:11px;font-weight:400}
.pg-ok{color:#2E5339}.pg-warn{color:#d97706}.pg-low{color:#dc2626}
.day-act{margin-left:auto;display:flex;gap:6px}
.dbtn{background:none;border:1px solid var(--br2);border-radius:10px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer}
.dbtn.pri{background:var(--g);color:#fff;border-color:var(--g)}

/* TABS */
.tabs-bar{background:var(--sf);border-bottom:1px solid var(--br);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:0;z-index:40}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;padding:0 12px;min-width:max-content}
.tab{border:none;background:none;padding:10px 14px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--g);border-bottom-color:var(--g)}

/* SORT */
.sort-bar{padding:10px 16px 6px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.slbl{font-size:12px;color:var(--tx3);white-space:nowrap}
.sbtn{border:1px solid var(--br2);background:none;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--tx2);cursor:pointer;white-space:nowrap}
.sbtn.on{background:var(--g);color:#fff;border-color:var(--g)}

/* GRID */
.grid{padding:8px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
@media(max-width:480px){.grid{grid-template-columns:1fr;padding:6px 10px}}
.card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:12px 14px;cursor:pointer;position:relative;transition:border-color .12s}
.card:active{transform:scale(.985)}
.card.sel{border:2px solid var(--g);box-shadow:0 0 0 3px rgba(46,83,57,.1)}
.card-cat-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.card-name{font-size:14px;font-weight:600;line-height:1.3;color:var(--tx);padding-right:30px;margin-bottom:6px}
.fav-btn{position:absolute;top:10px;right:11px;background:none;border:none;font-size:20px;cursor:pointer;line-height:1;padding:2px}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.bdg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.bw{background:var(--ab);color:var(--at)}
.bp{background:var(--gl);color:var(--gt)}
.macros{display:flex;gap:5px;flex-wrap:wrap}
.mac{font-size:12px;font-weight:600;padding:3px 9px;border-radius:10px}
.mk{background:var(--bg);color:var(--tx2)}
.mp{background:var(--gl);color:var(--gt)}
.mc{background:var(--ab);color:var(--at)}
.card-hint{font-size:11px;color:var(--tx3);margin-top:7px}

/* FAB */
.fab{position:fixed;bottom:calc(var(--tab) + var(--sb) + 12px);right:16px;z-index:100;background:var(--g);color:#fff;border:none;border-radius:28px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(46,83,57,.4)}
.fab:active{transform:scale(.95)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--sf);border-top:1px solid var(--br);display:flex;padding-bottom:var(--sb)}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;border:none;background:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600}
.nbtn.on{color:var(--g)}
.ni{font-size:22px;line-height:1.1}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--sf);border-radius:20px 20px 0 0;padding:0;width:100%;max-height:88vh;display:flex;flex-direction:column}
.sheet-handle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:10px auto 0}
.sheet-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.sheet-hdr h2{font-size:16px;font-weight:700;line-height:1.3;color:var(--tx);flex:1}
.close-btn{background:var(--bg);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tx2)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px;flex:1}
.sheet-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:6px}
.macros-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ing-title{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px}
.ing-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ing-list li{font-size:14px;color:var(--tx);padding:9px 12px;background:var(--bg);border-radius:10px;line-height:1.3}
.ing-list li::before{content:"• ";color:var(--g);font-weight:700}
.notes-box{background:var(--gl);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--gt);line-height:1.5;margin-bottom:14px}
.notes-box strong{display:block;margin-bottom:2px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;opacity:.7}
.link-btn{display:block;text-align:center;background:var(--bg);border:1px solid var(--br2);border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:var(--g);text-decoration:none;margin-bottom:14px}
.sheet-footer{padding:12px 18px calc(12px + var(--sb));border-top:1px solid var(--br);display:flex;gap:8px}
.sfbtn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none}
.sfbtn.sec{background:var(--bg);color:var(--tx2);border:1px solid var(--br2)}
.sfbtn.pri{background:var(--g);color:#fff}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty .ico{font-size:40px;margin-bottom:8px}
.empty p{font-size:14px;line-height:1.5}

/* PRINT */
@media print{
  .hdr,.tabs-bar,.sort-bar,.bnav,.fab,#day-panel,.overlay,.hbtn{display:none!important}
  body{padding:0;background:#fff;color:#000;font-size:12px}
  .grid{display:block;padding:0}
  .card{border:1px solid #ccc;border-radius:6px;padding:10px 12px;margin-bottom:8px;page-break-inside:avoid;break-inside:avoid}
  .card-name{font-size:13px;font-weight:700}
  .macros{margin-top:4px}
  .mac{border:1px solid #ccc;border-radius:4px;background:#f5f5f5!important;color:#333!important}
  .fav-btn{display:none}
  h2.print-hdr{font-size:16px;font-weight:700;padding:12px 0 6px;border-bottom:2px solid #2E5339;margin-bottom:8px;color:#2E5339}
  .print-section{margin-bottom:20px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>🥗 Meu Cardápio</h1>
      <div class="hdr-sub">Plano da Anna Júlia · Toque para ver a receita</div>
    </div>
    <div class="hdr-btns">
      <button class="hbtn" onclick="toggleDay()">📋 Meu dia</button>
      <button class="hbtn" onclick="window.print()">🖨️</button>
    </div>
  </div>
</div>

<div id="day-panel">
  <div class="day-inner">
    <div class="day-top">
      <h2>Cardápio de hoje</h2>
      <button onclick="clearDay()">Limpar ×</button>
    </div>
    <div class="day-rows" id="day-rows"></div>
    <div class="day-totals" id="day-totals"></div>
  </div>
</div>

<div class="tabs-bar"><div class="tabs-inner" id="tabs"></div></div>
<div class="sort-bar">
  <span class="slbl">Ordenar:</span>
  <button class="sbtn on" id="s-prot" onclick="setSort('prot')">💪 Proteína</button>
  <button class="sbtn" id="s-kcal" onclick="setSort('kcal')">🔥 Kcal</button>
  <button class="sbtn" id="s-nome" onclick="setSort('nome')">A–Z</button>
</div>
<div class="grid" id="grid"></div>

<button class="fab" onclick="sortearDia()">🎲 Sortear meu dia</button>

<nav class="bnav" id="bnav"></nav>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <h2 id="m-name"></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="sheet-body" id="m-body"></div>
    <div class="sheet-footer">
      <button class="sfbtn sec" id="m-fav-btn" onclick="modalToggleFav()">🤍 Favoritar</button>
      <button class="sfbtn pri" id="m-sel-btn" onclick="modalSelect()">Selecionar para hoje</button>
    </div>
  </div>
</div>

<script>
const CATS=['cafe','almoco','lanche','jantar'];
const LABELS={cafe:'☕ Café',almoco:'🍽 Almoço',lanche:'🥤 Lanche',jantar:'🌙 Jantar'};
const TABS_CFG=[
  {key:'cafe',label:'☕ Café'},
  {key:'almoco',label:'🍽 Almoço'},
  {key:'lanche',label:'🥤 Lanche'},
  {key:'jantar',label:'🌙 Jantar'},
  {key:'favs',label:'❤️ Favoritos'},
];

const DATA={
  cafe:[

let activeTab='cafe', sortBy='prot';
let selected={cafe:null,almoco:null,lanche:null,jantar:null};
let favs=new Set(JSON.parse(localStorage.getItem('r-favs')||'[]'));
let dayVisible=false;
let modalCat=null, modalIdx=null;

function saveFavs(){localStorage.setItem('r-favs',JSON.stringify([...favs]));}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

function sortItems(items){
  const s=[...items.map((it,i)=>({...it,_i:i}))];
  if(sortBy==='prot')s.sort((a,b)=>b.prot-a.prot);
  else if(sortBy==='kcal')s.sort((a,b)=>b.kcal-a.kcal);
  else s.sort((a,b)=>a.name.localeCompare(b.name,'pt'));
  return s;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS_CFG.map(t=>
    `<button class="tab${activeTab===t.key?' on':''}" onclick="setTab('${t.key}')">${t.label}</button>`
  ).join('');
}

function renderBnav(){
  document.getElementById('bnav').innerHTML=TABS_CFG.map(t=>`
    <button class="nbtn${activeTab===t.key?' on':''}" onclick="setTab('${t.key}')">
      <span class="ni">${t.label.split(' ')[0]}</span>
      <span>${t.label.split(' ').slice(1).join(' ')}</span>
    </button>
  `).join('');
}

function renderGrid(){
  const el=document.getElementById('grid');
  let items;
  if(activeTab==='favs'){
    items=[];
    CATS.forEach(cat=>DATA[cat].forEach((it,i)=>{
      if(favs.has(cat+'-'+i))items.push({...it,_cat:cat,_i:i,_multi:true});
    }));
  } else {
    items=sortItems(DATA[activeTab]).map(it=>({...it,_cat:activeTab}));
  }
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="ico">❤️</div><p>Sem favoritos ainda.<br>Toque no 🤍 em qualquer prato.</p></div>`;
    return;
  }
  el.innerHTML=items.map(it=>{
    const cat=it._cat, origIdx=it._i!==undefined?it._i:DATA[cat].findIndex(x=>x.name===it.name);
    const fk=cat+'-'+origIdx;
    const isFav=favs.has(fk), isSel=selected[cat]&&selected[cat].name===it.name;
    return `<div class="card${isSel?' sel':''}" onclick="openModal('${cat}',${origIdx})">
      <button class="fav-btn" onclick="toggleFav(event,'${cat}',${origIdx})">${isFav?'❤️':'🤍'}</button>
      ${it._multi?`<div class="card-cat-lbl">${LABELS[cat]}</div>`:''}
      <div class="card-name">${it.name}</div>
      <div class="badges">
        ${it.note?`<span class="bdg bw">⚠️ ${it.note}</span>`:''}
        ${it.prep?`<span class="bdg bp">⏱ ${it.prep}</span>`:''}
      </div>
      <div class="macros">
        <span class="mac mk">🔥 ${it.kcal}</span>
        <span class="mac mp">💪 ${it.prot}g</span>
        <span class="mac mc">🌾 ${it.carb}g</span>
      </div>
      <div class="card-hint">Toque para ver a receita completa →</div>
    </div>`;
  }).join('');
}

function renderDay(){
  const p=document.getElementById('day-panel');
  const filled=CATS.filter(c=>selected[c]);
  p.className=(filled.length>0||dayVisible)?'open':'';
  if(!filled.length&&!dayVisible){p.className='';return;}
  document.getElementById('day-rows').innerHTML=CATS.map(cat=>{
    const it=selected[cat];
    if(!it)return `<div class="day-row" style="opacity:.4"><span class="day-row-cat">${LABELS[cat]}</span><span class="day-row-name" style="color:var(--tx3)">Não selecionado</span></div>`;
    return `<div class="day-row">
      <span class="day-row-cat">${LABELS[cat]}</span>
      <span class="day-row-name">${it.name}</span>
      <button class="swap-btn" onclick="swapMeal('${cat}')">↻</button>
    </div>`;
  }).join('');
  const tK=CATS.reduce((s,c)=>s+(selected[c]?selected[c].kcal:0),0);
  const tP=CATS.reduce((s,c)=>s+(selected[c]?selected[c].prot:0),0);
  const tC=CATS.reduce((s,c)=>s+(selected[c]?selected[c].carb:0),0);
  const pc=tP>=120?'pg-ok':tP>=100?'pg-warn':'pg-low';
  const pm=tP>=120?'✓ Meta!':tP>=100?`Falta ${120-tP}g`:`${120-tP}g abaixo`;
  document.getElementById('day-totals').innerHTML=`
    <div class="dtot">🔥 ${tK} <span>kcal</span></div>
    <div class="dtot">💪 ${tP}g <span class="${pc}">${pm}</span></div>
    <div class="dtot">🌾 ${tC}g</div>
    <div class="day-act">
      <button class="dbtn" onclick="clearDay()">Limpar</button>
      <button class="dbtn pri" onclick="sortearDia()">🎲 Novo sorteio</button>
    </div>`;
}

function openModal(cat, idx){
  const it=DATA[cat][idx];
  modalCat=cat; modalIdx=idx;
  document.getElementById('m-name').textContent=it.name;
  const fk=cat+'-'+idx, isFav=favs.has(fk), isSel=selected[cat]&&selected[cat].name===it.name;
  document.getElementById('m-fav-btn').textContent=isFav?'❤️ Favorito':'🤍 Favoritar';
  document.getElementById('m-sel-btn').textContent=isSel?'✓ Selecionado para hoje':'Selecionar para hoje';
  document.getElementById('m-sel-btn').style.background=isSel?'#888':'var(--g)';
  let html=`<div class="sheet-cat">${LABELS[cat]} · ${it.kcal} kcal</div>`;
  html+=`<div class="macros-row">
    <span class="mac mp">💪 ${it.prot}g proteína</span>
    <span class="mac mc">🌾 ${it.carb}g carb</span>
    <span class="mac mk">🔥 ${it.kcal} kcal</span>
  </div>`;
  if(it.note)html+=`<div class="bdg bw" style="display:inline-block;margin-bottom:10px">⚠️ ${it.note}</div><br>`;
  if(it.prep)html+=`<div class="bdg bp" style="display:inline-block;margin-bottom:10px">⏱ ${it.prep}</div><br>`;
  html+=`<div class="ing-title">📋 Ingredientes</div><ul class="ing-list">${(it.ing||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`;
  if(it.notes)html+=`<div class="notes-box"><strong>Dica</strong>${it.notes}</div>`;
  if(it.link)html+=`<a class="link-btn" href="${it.link}" target="_blank">📱 Ver modo de preparo (TikTok/Instagram)</a>`;
  document.getElementById('m-body').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function maybeClose(e){
  if(e.target===document.getElementById('overlay'))closeModal();
}

function modalToggleFav(){
  if(modalCat===null)return;
  const fk=modalCat+'-'+modalIdx;
  favs.has(fk)?favs.delete(fk):favs.add(fk);
  saveFavs();
  openModal(modalCat,modalIdx);
  renderGrid();
}

function modalSelect(){
  if(modalCat===null)return;
  const it=DATA[modalCat][modalIdx];
  selected[modalCat]=selected[modalCat]&&selected[modalCat].name===it.name?null:it;
  openModal(modalCat,modalIdx);
  renderGrid();renderDay();
}

function setTab(t){activeTab=t;renderTabs();renderBnav();renderGrid();}

function setSort(s){
  sortBy=s;
  ['prot','kcal','nome'].forEach(x=>document.getElementById('s-'+x).classList.toggle('on',x===s));
  renderGrid();
}

function sortearDia(){
  CATS.forEach(cat=>{selected[cat]=rand(DATA[cat]);});
  dayVisible=true;renderGrid();renderDay();
  document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function swapMeal(cat){
  const cur=selected[cat]; let next;
  do{next=rand(DATA[cat]);}while(DATA[cat].length>1&&next.name===cur.name);
  selected[cat]=next;renderGrid();renderDay();
}

function clearDay(){CATS.forEach(c=>selected[c]=null);dayVisible=false;renderGrid();renderDay();}
function toggleDay(){dayVisible=!dayVisible;renderDay();if(dayVisible)document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'});}

renderTabs();renderBnav();renderGrid();renderDay();
</script>
