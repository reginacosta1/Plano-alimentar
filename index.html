<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cardápio">
<title>Meu Cardápio · Anna Júlia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--g:#2E5339;--gl:#e8f4ec;--gt:#2E5339;--ab:#fef3e2;--at:#92400e;--bg:#f4f4f0;--sf:#fff;--tx:#111;--tx2:#555;--tx3:#999;--br:#e8e8e6;--br2:#d0d0cc;--tab:60px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
@media(prefers-color-scheme:dark){:root{--bg:#111;--sf:#1c1c1e;--tx:#f0f0f0;--tx2:#aaa;--tx3:#666;--br:#2a2a2a;--br2:#3a3a3a;--gl:#1a3325;--ab:#2d1f00;--at:#f6c05c}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
body{padding-bottom:calc(var(--tab) + var(--sb) + 8px);padding-top:var(--st)}
.hdr{background:var(--g);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.hdr-btns{display:flex;gap:6px}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:10px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
/* DAY PANEL */
#day-panel{background:var(--sf);border-bottom:1px solid var(--br);max-height:0;overflow:hidden;transition:max-height .3s}
#day-panel.open{max-height:500px}
.day-inner{padding:12px 16px}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.day-top h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3)}
.day-top button{font-size:12px;color:var(--tx3);background:none;border:none;cursor:pointer}
.day-rows{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.day-row{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:7px 10px}
.day-row-cat{font-size:11px;font-weight:700;color:var(--tx2);min-width:50px}
.day-row-name{font-size:13px;color:var(--tx);flex:1;line-height:1.25}
.swap-btn{background:none;border:1px solid var(--br2);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--tx2);cursor:pointer}
.day-totals{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dtot{background:var(--bg);border-radius:10px;padding:5px 10px;font-size:13px;font-weight:700;color:var(--tx)}
.dtot span{font-size:11px;font-weight:400}
.pg-ok{color:#2E5339}.pg-warn{color:#d97706}.pg-low{color:#dc2626}
.day-act{margin-left:auto;display:flex;gap:6px}
.dbtn{background:none;border:1px solid var(--br2);border-radius:10px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer}
.dbtn.pri{background:var(--g);color:#fff;border-color:var(--g)}
/* TABS */
.tabs-bar{background:var(--sf);border-bottom:1px solid var(--br);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:0;z-index:40}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;padding:0 12px;min-width:max-content}
.tab{border:none;background:none;padding:10px 14px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--g);border-bottom-color:var(--g)}
/* SORT */
.sort-bar{padding:10px 16px 6px;display:flex;align-items:center;gap:6px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.slbl{font-size:12px;color:var(--tx3);white-space:nowrap}
.sbtn{border:1px solid var(--br2);background:none;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--tx2);cursor:pointer;white-space:nowrap}
.sbtn.on{background:var(--g);color:#fff;border-color:var(--g)}
/* GRID */
.grid{padding:8px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
@media(max-width:480px){.grid{grid-template-columns:1fr;padding:6px 10px}}
.card{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:12px 14px;cursor:pointer;position:relative}
.card:active{transform:scale(.985)}
.card.sel{border:2px solid var(--g);box-shadow:0 0 0 3px rgba(46,83,57,.1)}
.card-cat-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.card-name{font-size:14px;font-weight:600;line-height:1.3;color:var(--tx);padding-right:30px;margin-bottom:6px}
.fav-btn{position:absolute;top:10px;right:11px;background:none;border:none;font-size:20px;cursor:pointer;line-height:1;padding:2px}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.bdg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.bw{background:var(--ab);color:var(--at)}.bp{background:var(--gl);color:var(--gt)}
.macros{display:flex;gap:5px;flex-wrap:wrap}
.mac{font-size:12px;font-weight:600;padding:3px 9px;border-radius:10px}
.mk{background:var(--bg);color:var(--tx2)}.mp{background:var(--gl);color:var(--gt)}.mc{background:var(--ab);color:var(--at)}
.card-hint{font-size:11px;color:var(--tx3);margin-top:7px}
/* FAB */
.fab{position:fixed;bottom:calc(var(--tab) + var(--sb) + 12px);right:16px;z-index:100;background:var(--g);color:#fff;border:none;border-radius:28px;padding:14px 22px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(46,83,57,.4)}
.fab:active{transform:scale(.95)}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--sf);border-top:1px solid var(--br);display:flex;padding-bottom:var(--sb)}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;border:none;background:none;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600}
.nbtn.on{color:var(--g)}
.ni{font-size:22px;line-height:1.1}
/* RECIPE MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column}
.sheet-handle{width:36px;height:4px;background:var(--br2);border-radius:2px;margin:10px auto 0}
.sheet-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.sheet-hdr h2{font-size:16px;font-weight:700;line-height:1.3;color:var(--tx);flex:1}
.close-btn{background:var(--bg);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tx2)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px;flex:1}
.sheet-cat{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:6px}
.macros-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ing-title{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:8px}
.ing-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ing-list li{font-size:14px;color:var(--tx);padding:9px 12px;background:var(--bg);border-radius:10px;line-height:1.3}
.ing-list li::before{content:"• ";color:var(--g);font-weight:700}
.notes-box{background:var(--gl);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--gt);line-height:1.5;margin-bottom:14px}
.notes-box strong{display:block;margin-bottom:2px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;opacity:.7}
.link-btn{display:block;text-align:center;background:var(--bg);border:1px solid var(--br2);border-radius:10px;padding:10px;font-size:13px;font-weight:600;color:var(--g);text-decoration:none;margin-bottom:14px}
.sheet-footer{padding:12px 18px calc(12px + var(--sb));border-top:1px solid var(--br);display:flex;gap:8px}
.sfbtn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none}
.sfbtn.sec{background:var(--bg);color:var(--tx2);border:1px solid var(--br2)}
.sfbtn.pri{background:var(--g);color:#fff}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty .ico{font-size:40px;margin-bottom:8px}
.empty p{font-size:14px;line-height:1.5}
/* ===== DIARY ===== */
#view-diario{display:none}
.diary-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.diary-date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:14px;padding:10px 14px;border:1px solid var(--br)}
.diary-date-label{font-size:16px;font-weight:700;color:var(--tx);text-align:center;flex:1}
.diary-date-sub{font-size:11px;color:var(--tx3);text-align:center;margin-top:1px}
.dnav-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx2);padding:4px 10px;border-radius:8px}
.dnav-btn:active{background:var(--bg)}
.dsec{background:var(--sf);border-radius:14px;padding:14px;border:1px solid var(--br)}
.dsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
/* water */
.water-row{display:flex;align-items:center;justify-content:space-between}
.water-display{display:flex;align-items:baseline;gap:3px}
.water-val{font-size:32px;font-weight:700;color:var(--g);line-height:1}
.water-unit{font-size:14px;color:var(--tx2);font-weight:500}
.water-btns{display:flex;gap:8px}
.wbtn{width:44px;height:44px;border-radius:50%;border:none;font-size:24px;cursor:pointer;background:var(--gl);color:var(--g);font-weight:700;display:flex;align-items:center;justify-content:center}
.wbtn:active{transform:scale(.92)}
.water-bar-wrap{margin-top:10px;background:var(--bg);border-radius:6px;height:6px;overflow:hidden}
.water-bar{height:100%;background:var(--g);border-radius:6px;transition:width .3s}
/* meal slots */
.meal-slots{display:flex;flex-direction:column;gap:0}
.mslot{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--br);cursor:pointer}
.mslot:last-child{border-bottom:none;padding-bottom:0}
.mslot:active{opacity:.7}
.mslot-cat{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;min-width:50px;padding-top:3px}
.mslot-body{flex:1}
.mslot-empty{font-size:13px;color:var(--tx3);display:flex;align-items:center;gap:6px;padding:4px 0}
.mslot-plus{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1.5px dashed var(--br2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);flex-shrink:0}
.mslot-name{font-size:14px;font-weight:600;color:var(--tx);line-height:1.3;margin-bottom:4px}
.mslot-macros{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.luxo-tag{display:inline-block;font-size:10px;font-weight:700;background:var(--ab);color:var(--at);padding:1px 6px;border-radius:8px;margin-bottom:4px}
.mslot-photo{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;margin-top:2px}
/* mood */
.mood-row{display:flex;gap:8px}
.mood-btn{flex:1;padding:12px 6px;border-radius:12px;border:2px solid var(--br);background:none;font-size:26px;cursor:pointer;text-align:center}
.mood-btn span{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-top:3px}
.mood-btn.on{border-color:var(--g);background:var(--gl)}
.mood-btn.on span{color:var(--g)}
/* note */
.diary-note{width:100%;border:none;background:var(--bg);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--tx);font-family:inherit;resize:none;min-height:72px;outline:none;line-height:1.5}
/* weekly */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px}
.wday-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase}
.wdot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.wdot.ok{background:var(--gl);color:var(--g)}
.wdot.warn{background:#fef3e2;color:#d97706}
.wdot.low{background:#fce8e8;color:#dc2626}
.wdot.none{background:var(--bg);color:var(--tx3)}
.wdot.today{box-shadow:0 0 0 2.5px var(--g)}
.wday-prot{font-size:9px;color:var(--tx3);font-weight:600}
/* DIARY MEAL MODAL */
.dm-tabs{display:flex;border:1px solid var(--br);border-radius:10px;overflow:hidden;margin-bottom:14px}
.dm-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--tx2)}
.dm-tab.on{background:var(--g);color:#fff}
.dm-plan-list{display:flex;flex-direction:column;gap:6px;max-height:38vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dm-item{padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;border:2px solid transparent}
.dm-item.on{border-color:var(--g);background:var(--gl)}
.dm-item:active{opacity:.7}
.dm-item-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.dm-item-macs{font-size:11px;color:var(--tx2)}
.dm-form{display:flex;flex-direction:column;gap:10px}
.dm-inp{width:100%;border:1px solid var(--br2);background:var(--bg);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--tx);font-family:inherit;outline:none}
.dm-inp:focus{border-color:var(--g)}
.dm-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dm-photo-btn{width:100%;padding:12px;border:2px dashed var(--br2);border-radius:10px;background:none;color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.dm-preview{width:100%;height:120px;object-fit:cover;border-radius:10px;margin-top:8px;display:none}
.dm-clear{width:100%;padding:10px;border:1px solid #fca5a5;border-radius:10px;background:none;color:#dc2626;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
</style>
</head>
<body>

<!-- ===== CARDÁPIO VIEW ===== -->
<div id="view-cardapio">
  <div class="hdr">
    <div class="hdr-row">
      <div><h1>🥗 Meu Cardápio</h1><div class="hdr-sub">Plano da Anna Júlia · Toque para ver a receita</div></div>
      <div class="hdr-btns"><button class="hbtn" onclick="toggleDay()">📋 Meu dia</button><button class="hbtn" onclick="window.print()">🖨️</button></div>
    </div>
  </div>
  <div id="day-panel"><div class="day-inner"><div class="day-top"><h2>Cardápio de hoje</h2><button onclick="clearDay()">Limpar ×</button></div><div class="day-rows" id="day-rows"></div><div class="day-totals" id="day-totals"></div></div></div>
  <div class="tabs-bar"><div class="tabs-inner" id="tabs"></div></div>
  <div class="sort-bar"><span class="slbl">Ordenar:</span><button class="sbtn on" id="s-prot" onclick="setSort('prot')">💪 Proteína</button><button class="sbtn" id="s-kcal" onclick="setSort('kcal')">🔥 Kcal</button><button class="sbtn" id="s-nome" onclick="setSort('nome')">A–Z</button></div>
  <div class="grid" id="grid"></div>
  <button class="fab" onclick="sortearDia()">🎲 Sortear meu dia</button>
</div>

<!-- ===== DIÁRIO VIEW ===== -->
<div id="view-diario">
  <div class="hdr">
    <div class="hdr-row">
      <div><h1>📖 Diário</h1><div class="hdr-sub">Registre o que você comeu</div></div>
    </div>
  </div>
  <div class="diary-wrap">
    <!-- date nav -->
    <div class="diary-date-nav">
      <button class="dnav-btn" onclick="navigateDay(-1)">‹</button>
      <div>
        <div class="diary-date-label" id="d-label">Hoje</div>
        <div class="diary-date-sub" id="d-sub"></div>
      </div>
      <button class="dnav-btn" onclick="navigateDay(1)" id="d-next">›</button>
    </div>
    <!-- weekly -->
    <div class="dsec">
      <div class="dsec-title">📅 Últimos 7 dias — proteína</div>
      <div class="week-grid" id="week-grid"></div>
    </div>
    <!-- water -->
    <div class="dsec">
      <div class="dsec-title">💧 Água</div>
      <div class="water-row">
        <div class="water-display"><span class="water-val" id="water-val">0</span><span class="water-unit">L</span></div>
        <div class="water-btns">
          <button class="wbtn" onclick="updateWater(-0.25)">−</button>
          <button class="wbtn" onclick="updateWater(0.25)">+</button>
        </div>
      </div>
      <div class="water-bar-wrap"><div class="water-bar" id="water-bar" style="width:0%"></div></div>
    </div>
    <!-- meals -->
    <div class="dsec">
      <div class="dsec-title">🍽 Refeições</div>
      <div class="meal-slots" id="d-meals"></div>
    </div>
    <!-- mood -->
    <div class="dsec">
      <div class="dsec-title">🧠 Como me senti hoje?</div>
      <div class="mood-row">
        <button class="mood-btn" id="mood-😊" onclick="setMood('😊')">😊<span>Bem saciada</span></button>
        <button class="mood-btn" id="mood-😐" onclick="setMood('😐')">😐<span>Neutro</span></button>
        <button class="mood-btn" id="mood-😔" onclick="setMood('😔')">😔<span>Com fome</span></button>
      </div>
    </div>
    <!-- note -->
    <div class="dsec">
      <div class="dsec-title">📝 Nota do dia</div>
      <textarea class="diary-note" id="d-note" placeholder="Algo que quer lembrar sobre hoje... como foi o treino, se estava no período, se comeu fora..." onblur="saveNote()"></textarea>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nbtn on" id="nb-cardapio" onclick="setMainView('cardapio')"><span class="ni">🥗</span><span>Cardápio</span></button>
  <button class="nbtn" id="nb-diario" onclick="setMainView('diario')"><span class="ni">📖</span><span>Diário</span></button>
</nav>

<!-- RECIPE MODAL -->
<div class="overlay" id="overlay-recipe" onclick="maybeCloseRecipe(event)">
  <div class="sheet"><div class="sheet-handle"></div><div class="sheet-hdr"><h2 id="m-name"></h2><button class="close-btn" onclick="closeRecipe()">✕</button></div><div class="sheet-body" id="m-body"></div><div class="sheet-footer"><button class="sfbtn sec" id="m-fav-btn" onclick="modalToggleFav()">🤍 Favoritar</button><button class="sfbtn pri" id="m-sel-btn" onclick="modalSelect()">Selecionar para hoje</button></div></div>
</div>

<!-- DIARY MEAL MODAL -->
<div class="overlay" id="overlay-dm" onclick="maybeCloseDm(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><h2 id="dm-title">Registrar refeição</h2><button class="close-btn" onclick="closeDm()">✕</button></div>
    <div class="sheet-body">
      <div class="dm-tabs">
        <button class="dm-tab on" id="dm-tab-plan" onclick="setDmTab('plan')">📋 Do plano</button>
        <button class="dm-tab" id="dm-tab-luxo" onclick="setDmTab('luxo')">✨ Refeição luxo</button>
      </div>
      <div id="dm-plan-content"><div class="dm-plan-list" id="dm-plan-list"></div></div>
      <div id="dm-luxo-content" style="display:none">
        <div class="dm-form">
          <input class="dm-inp" id="dm-luxo-name" placeholder="O que você comeu? (ex: Pizza, Almoço no restaurante...)" type="text">
          <div class="dm-row2">
            <input class="dm-inp" id="dm-luxo-kcal" placeholder="Kcal (opcional)" type="number" inputmode="numeric">
            <input class="dm-inp" id="dm-luxo-prot" placeholder="Proteína g (opcional)" type="number" inputmode="numeric">
          </div>
        </div>
      </div>
      <input type="file" accept="image/*" id="dm-photo-input" style="display:none" onchange="handleDmPhoto(this)">
      <button class="dm-photo-btn" onclick="document.getElementById('dm-photo-input').click()"><span id="dm-photo-label">📷 Adicionar foto do prato</span></button>
      <img class="dm-preview" id="dm-preview" src="" alt="foto">
      <button class="dm-clear" id="dm-clear-btn" onclick="clearDiaryMeal()" style="display:none">🗑 Limpar esta refeição</button>
    </div>
    <div class="sheet-footer"><button class="sfbtn pri" onclick="saveDiaryMeal()">Salvar</button></div>

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sortItems(items){const s=[...items.map((it,i)=>({...it,_i:i}))];if(sortBy==='prot')s.sort((a,b)=>b.prot-a.prot);else if(sortBy==='kcal')s.sort((a,b)=>b.kcal-a.kcal);else s.sort((a,b)=>a.name.localeCompare(b.name,'pt'));return s;}

function compressPhoto(file,cb){const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const MAX=400;let w=img.width,h=img.height;if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}else if(h>w&&h>MAX){w=w*MAX/h;h=MAX;}else if(w>MAX){w=MAX;h=MAX;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);cb(c.toDataURL('image/jpeg',0.5));};img.src=url;}

  if(!items.length){el.innerHTML='<div class="empty"><div class="ico">❤️</div><p>Sem favoritos ainda.<br>Toque no 🤍 em qualquer prato.</p></div>';return;}
  el.innerHTML=items.map(it=>{const cat=it._cat,origIdx=it._i!==undefined?it._i:DATA[cat].findIndex(x=>x.name===it.name);const fk=cat+'-'+origIdx;const isFav=favs.has(fk),isSel=selected[cat]&&selected[cat].name===it.name;
  return `<div class="card${isSel?' sel':''}" onclick="openRecipe('${cat}',${origIdx})"><button class="fav-btn" onclick="toggleFav(event,'${cat}',${origIdx})">${isFav?'❤️':'🤍'}</button>${it._multi?`<div class="card-cat-lbl">${LABELS[cat]}</div>`:''}<div class="card-name">${it.name}</div><div class="badges">${it.note?`<span class="bdg bw">⚠️ ${it.note}</span>`:''}${it.prep?`<span class="bdg bp">⏱ ${it.prep}</span>`:''}</div><div class="macros"><span class="mac mk">🔥 ${it.kcal}</span><span class="mac mp">💪 ${it.prot}g</span><span class="mac mc">🌾 ${it.carb}g</span></div><div class="card-hint">Toque para ver a receita →</div></div>`;}).join('');}
function renderDay(){
  const p=document.getElementById('day-panel');const filled=CATS.filter(c=>selected[c]);
  p.className=(filled.length>0||dayVisible)?'open':'';
  if(!filled.length&&!dayVisible)return;
  document.getElementById('day-rows').innerHTML=CATS.map(cat=>{const it=selected[cat];if(!it)return `<div class="day-row" style="opacity:.4"><span class="day-row-cat">${LABELS[cat]}</span><span class="day-row-name" style="color:var(--tx3)">Não selecionado</span></div>`;return `<div class="day-row"><span class="day-row-cat">${LABELS[cat]}</span><span class="day-row-name">${it.name}</span><button class="swap-btn" onclick="swapMeal('${cat}')">↻</button></div>`;}).join('');
  const tK=CATS.reduce((s,c)=>s+(selected[c]?selected[c].kcal:0),0);const tP=CATS.reduce((s,c)=>s+(selected[c]?selected[c].prot:0),0);const tC=CATS.reduce((s,c)=>s+(selected[c]?selected[c].carb:0),0);
  const pc=tP>=120?'pg-ok':tP>=100?'pg-warn':'pg-low';const pm=tP>=120?'✓ Meta!':tP>=100?`Falta ${120-tP}g`:`${120-tP}g abaixo`;
  document.getElementById('day-totals').innerHTML=`<div class="dtot">🔥 ${tK} <span>kcal</span></div><div class="dtot">💪 ${tP}g <span class="${pc}">${pm}</span></div><div class="dtot">🌾 ${tC}g</div><div class="day-act"><button class="dbtn" onclick="clearDay()">Limpar</button><button class="dbtn pri" onclick="sortearDia()">🎲 Novo sorteio</button></div>`;}
function openRecipe(cat,idx){
  const it=DATA[cat][idx];modalCat=cat;modalIdx=idx;
  document.getElementById('m-name').textContent=it.name;
  const fk=cat+'-'+idx,isFav=favs.has(fk),isSel=selected[cat]&&selected[cat].name===it.name;
  document.getElementById('m-fav-btn').textContent=isFav?'❤️ Favorito':'🤍 Favoritar';
  document.getElementById('m-sel-btn').textContent=isSel?'✓ Selecionado':'Selecionar para hoje';
  document.getElementById('m-sel-btn').style.background=isSel?'#888':'var(--g)';
  let html=`<div class="sheet-cat">${LABELS[cat]} · ${it.kcal} kcal</div><div class="macros-row"><span class="mac mp">💪 ${it.prot}g proteína</span><span class="mac mc">🌾 ${it.carb}g carb</span><span class="mac mk">🔥 ${it.kcal} kcal</span></div>`;
  if(it.note)html+=`<div class="bdg bw" style="display:inline-block;margin-bottom:10px">⚠️ ${it.note}</div><br>`;
  if(it.prep)html+=`<div class="bdg bp" style="display:inline-block;margin-bottom:10px">⏱ ${it.prep}</div><br>`;
  html+=`<div class="ing-title">📋 Ingredientes</div><ul class="ing-list">${(it.ing||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`;
  if((it.ing||[]).some(i=>/fruta/i.test(i))){
    html+=`<details class="notes-box" style="background:var(--bg);color:var(--tx2);cursor:pointer"><summary style="font-weight:700;color:var(--g)">🍎 Lista de substituição de frutas (toque para abrir)</summary><ul class="ing-list" style="margin-top:8px;margin-bottom:0">${FRUIT_LIST.map(f=>`<li>${f}</li>`).join('')}</ul></details>`;
  }
  if(it.notes)html+=`<div class="notes-box"><strong>Dica</strong>${it.notes}</div>`;
  if(it.link)html+=`<a class="link-btn" href="${it.link}" target="_blank">📱 Ver modo de preparo</a>`;
  document.getElementById('m-body').innerHTML=html;
  document.getElementById('overlay-recipe').classList.add('open');document.body.style.overflow='hidden';}
function closeRecipe(){document.getElementById('overlay-recipe').classList.remove('open');document.body.style.overflow='';}
function maybeCloseRecipe(e){if(e.target===document.getElementById('overlay-recipe'))closeRecipe();}
function modalToggleFav(){if(modalCat===null)return;const fk=modalCat+'-'+modalIdx;favs.has(fk)?favs.delete(fk):favs.add(fk);saveFavs();openRecipe(modalCat,modalIdx);renderGrid();}
function modalSelect(){if(modalCat===null)return;const it=DATA[modalCat][modalIdx];selected[modalCat]=selected[modalCat]&&selected[modalCat].name===it.name?null:it;openRecipe(modalCat,modalIdx);renderGrid();renderDay();}
function setTab(t){activeTab=t;renderTabs();renderGrid();}
function setSort(s){sortBy=s;['prot','kcal','nome'].forEach(x=>document.getElementById('s-'+x).classList.toggle('on',x===s));renderGrid();}
function sortearDia(){CATS.forEach(cat=>{selected[cat]=rand(DATA[cat]);});dayVisible=true;renderGrid();renderDay();document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'});}
function swapMeal(cat){const cur=selected[cat];let next;do{next=rand(DATA[cat]);}while(DATA[cat].length>1&&next.name===cur.name);selected[cat]=next;renderGrid();renderDay();}
function clearDay(){CATS.forEach(c=>selected[c]=null);dayVisible=false;renderGrid();renderDay();}
function toggleDay(){dayVisible=!dayVisible;renderDay();if(dayVisible)document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'});}
function toggleFav(e,cat,idx){e.stopPropagation();const fk=cat+'-'+idx;favs.has(fk)?favs.delete(fk):favs.add(fk);saveFavs();renderGrid();}

// ===== DIARY =====
function navigateDay(delta){
  const d=new Date(diaryDate+'T12:00:00');d.setDate(d.getDate()+delta);
  if(d>new Date())return;
  diaryDate=dateStr(d);renderDiary();}
function renderDiary(){
  const today=todayStr();const isToday=diaryDate===today;
  const d=new Date(diaryDate+'T12:00:00');
  document.getElementById('d-label').textContent=isToday?'Hoje':diaryDate===dateStr(new Date(Date.now()-86400000))?'Ontem':d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'});
  document.getElementById('d-sub').textContent=d.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('d-next').style.opacity=isToday?'0.3':'1';
  document.getElementById('d-next').disabled=isToday;
  const diary=getDiary(diaryDate);
  // water
  const w=diary.water||0;document.getElementById('water-val').textContent=w%1===0?w:w.toFixed(2).replace('.',',');
  document.getElementById('water-bar').style.width=Math.min(w/3*100,100)+'%';
  // meals
  document.getElementById('d-meals').innerHTML=CATS.map(cat=>{
    const m=diary.meals[cat];const photo=getPhoto(diaryDate,cat);
    if(!m)return `<div class="mslot" onclick="openDm('${cat}')"><div class="mslot-cat">${LABELS[cat]}</div><div class="mslot-body"><div class="mslot-empty"><div class="mslot-plus">+</div>Toque para registrar</div></div></div>`;
    const isLuxo=m.luxo;
    return `<div class="mslot" onclick="openDm('${cat}')">
      <div class="mslot-cat">${LABELS[cat]}</div>
      <div class="mslot-body">
        ${isLuxo?'<div class="luxo-tag">✨ Refeição luxo</div>':''}
        <div class="mslot-name">${m.name}</div>
        <div class="mslot-macros">
          ${m.prot?`<span class="mac mp" style="font-size:11px">💪 ${m.prot}g</span>`:''}
          ${m.kcal?`<span class="mac mk" style="font-size:11px">🔥 ${m.kcal}</span>`:''}
        </div>
      </div>
      ${photo?`<img class="mslot-photo" src="${photo}" alt="foto">`:''}
    </div>`;
  }).join('');
  // mood
  ['😊','😐','😔'].forEach(m=>{document.getElementById('mood-'+m).classList.toggle('on',diary.mood===m);});
  // note
  document.getElementById('d-note').value=diary.note||'';
  renderWeekly();}

function updateWater(delta){
  const diary=getDiary(diaryDate);
  diary.water=Math.max(0,Math.min(5,Math.round((diary.water+delta)*100)/100));
  saveDiary(diaryDate,diary);renderDiary();}

function setMood(m){const diary=getDiary(diaryDate);diary.mood=diary.mood===m?null:m;saveDiary(diaryDate,diary);renderDiary();}
function saveNote(){const diary=getDiary(diaryDate);diary.note=document.getElementById('d-note').value;saveDiary(diaryDate,diary);}

function renderWeekly(){
  const el=document.getElementById('week-grid');const today=todayStr();
  let html='';
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);const ds=dateStr(d);
    const diary=getDiary(ds);
    const tP=CATS.reduce((s,c)=>s+(diary.meals[c]&&diary.meals[c].prot?diary.meals[c].prot:0),0);
    const hasData=CATS.some(c=>diary.meals[c]);
    const cls=!hasData?'none':tP>=120?'ok':tP>=100?'warn':'low';
    const isToday=ds===today;const isActive=ds===diaryDate;
    const dow=WEEKDAYS[d.getDay()];
    html+=`<div class="wday" onclick="diaryDate='${ds}';renderDiary()">
      <div class="wday-lbl">${dow}</div>
      <div class="wdot ${cls}${isActive?' today':''}">${hasData?tP+'g':''}</div>
      <div class="wday-prot">${d.getDate()}/${d.getMonth()+1}</div>
    </div>`;
  }
  el.innerHTML=html;}

// DIARY MEAL MODAL
function openDm(cat){
  dmCat=cat;dmPhoto=null;dmSelIdx=null;
  const diary=getDiary(diaryDate);const current=diary.meals[cat];
  document.getElementById('dm-title').textContent=`${LABELS[cat]} — ${new Date(diaryDate+'T12:00:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'})}`;
  // photo
  document.getElementById('dm-photo-input').value='';
  document.getElementById('dm-preview').style.display='none';
  const existingPhoto=getPhoto(diaryDate,cat);
  if(existingPhoto){document.getElementById('dm-preview').src=existingPhoto;document.getElementById('dm-preview').style.display='block';document.getElementById('dm-photo-label').textContent='📷 Trocar foto';dmPhoto=existingPhoto;}
  else{document.getElementById('dm-photo-label').textContent='📷 Adicionar foto do prato';}
  // clear btn
  document.getElementById('dm-clear-btn').style.display=current?'block':'none';
  // set initial mode
  const initMode=current&&current.luxo?'luxo':'plan';
  setDmTab(initMode);
  // if existing plan meal, pre-select it
  if(current&&!current.luxo){
    const idx=DATA[cat].findIndex(x=>x.name===current.name);
    if(idx>=0){dmSelIdx=idx;setTimeout(()=>{const items=document.querySelectorAll('.dm-item');if(items[idx])items[idx].classList.add('on');},50);}
  }
  // if existing luxo
  if(current&&current.luxo){
    document.getElementById('dm-luxo-name').value=current.name||'';
    document.getElementById('dm-luxo-kcal').value=current.kcal||'';
    document.getElementById('dm-luxo-prot').value=current.prot||'';
  }
  document.getElementById('overlay-dm').classList.add('open');document.body.style.overflow='hidden';}

function closeDm(){document.getElementById('overlay-dm').classList.remove('open');document.body.style.overflow='';}
function maybeCloseDm(e){if(e.target===document.getElementById('overlay-dm'))closeDm();}

function setDmTab(mode){
  dmMode=mode;
  document.getElementById('dm-tab-plan').classList.toggle('on',mode==='plan');
  document.getElementById('dm-tab-luxo').classList.toggle('on',mode==='luxo');
  document.getElementById('dm-plan-content').style.display=mode==='plan'?'':'none';
  document.getElementById('dm-luxo-content').style.display=mode==='luxo'?'':'none';
  if(mode==='plan'){
    const items=DATA[dmCat];
    document.getElementById('dm-plan-list').innerHTML=items.map((it,i)=>`<div class="dm-item${dmSelIdx===i?' on':''}" onclick="selectDmItem(${i})"><div class="dm-item-name">${it.name}</div><div class="dm-item-macs">💪 ${it.prot}g prot &nbsp;·&nbsp; 🔥 ${it.kcal} kcal</div></div>`).join('');
  } else {
    if(!document.getElementById('dm-luxo-name').value){document.getElementById('dm-luxo-kcal').value='';document.getElementById('dm-luxo-prot').value='';}
  }}

function selectDmItem(idx){
  dmSelIdx=idx;
  document.querySelectorAll('.dm-item').forEach((el,i)=>el.classList.toggle('on',i===idx));}

function handleDmPhoto(input){
  if(!input.files||!input.files[0])return;
  compressPhoto(input.files[0],(dataUrl)=>{
    dmPhoto=dataUrl;
    document.getElementById('dm-preview').src=dataUrl;document.getElementById('dm-preview').style.display='block';
    document.getElementById('dm-photo-label').textContent='📷 Trocar foto';});}

function saveDiaryMeal(){
  const diary=getDiary(diaryDate);
  if(dmMode==='plan'){
    if(dmSelIdx===null){alert('Selecione um prato do plano.');return;}
    const it=DATA[dmCat][dmSelIdx];
    diary.meals[dmCat]={name:it.name,kcal:it.kcal,prot:it.prot,luxo:false};
  } else {
    const name=document.getElementById('dm-luxo-name').value.trim();
    if(!name){alert('Digite o nome do que você comeu.');return;}
    const kcal=parseInt(document.getElementById('dm-luxo-kcal').value)||null;
    const prot=parseInt(document.getElementById('dm-luxo-prot').value)||null;
    diary.meals[dmCat]={name,kcal,prot,luxo:true};
  }
  saveDiary(diaryDate,diary);
  savePhoto(diaryDate,dmCat,dmPhoto);
  closeDm();renderDiary();}

function clearDiaryMeal(){
  const diary=getDiary(diaryDate);
  diary.meals[dmCat]=null;
  saveDiary(diaryDate,diary);
  savePhoto(diaryDate,dmCat,null);
  closeDm();renderDiary();}

// ===== INIT =====
renderTabs();renderGrid();renderDay();
</script>
</body>
</html>
